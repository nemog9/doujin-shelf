name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  android:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install frontend dependencies
        run: pnpm install

      - name: Initialize Android project
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_LATEST_HOME }}
        run: pnpm tauri android init

      - name: Build Android APK (debug)
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_LATEST_HOME }}
        run: pnpm tauri android build --debug

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: src-tauri/gen/android/app/build/outputs/apk/universal/debug/app-universal-debug.apk
          name: 'DoujinShelf ${{ github.ref_name }}'

  desktop:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'DoujinShelf ${{ github.ref_name }}'
          releaseBody: |
            ## ダウンロード

            | OS | ファイル |
            |---|---|
            | Android | `app-universal-release.apk` |
            | macOS (Apple Silicon) | `DoujinShelf_*_aarch64.dmg` |
            | Windows | `DoujinShelf_*_x64-setup.exe` |

            > **注意**: デスクトップ版はコード署名なしのビルドです。
            > - macOS: 「開発元が未確認」の警告が出た場合、右クリック→「開く」で実行できます
            > - Windows: SmartScreen 警告が出た場合、「詳細情報」→「実行」で実行できます
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
