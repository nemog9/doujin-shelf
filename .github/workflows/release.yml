name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'DoujinShelf ${{ github.ref_name }}'
          releaseBody: |
            ## ダウンロード

            | OS | ファイル |
            |---|---|
            | macOS (Apple Silicon) | `DoujinShelf_*_aarch64.dmg` |
            | macOS (Intel) | `DoujinShelf_*_x64.dmg` |
            | Windows | `DoujinShelf_*_x64-setup.exe` |

            > **注意**: コード署名なしのビルドです。
            > - macOS: 「開発元が未確認」の警告が出た場合、右クリック→「開く」で実行できます
            > - Windows: SmartScreen 警告が出た場合、「詳細情報」→「実行」で実行できます
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
